<!DOCTYPE html>
<html>
<head>
    <title>Top Frame</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f2f2f2; padding: 10px; }
        .header { display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 24px; font-weight: bold; color: #333; }
        .nav-links a { margin-left: 15px; text-decoration: none; color: #000; font-weight: bold; }
        .nav-links a:hover { color: blue; }
         .header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            width: 50px;
            height: 50px;
            background-color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2c3e50;
            font-weight: bold;
        }

        .website-name {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #ecf0f1;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #3498db;
        }

        .nav-links a.active {
            color: #3498db;
            border-bottom: 2px solid #3498db;
        }

    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <!-- Replace src with your actual logo file -->
            <img src="logo.png" alt="Logo" width="80" height="50"> 
            &nbsp; <span style="color: white;">EVERMORE UNIVERSITY</span>
        </div>
        <div class="nav-links">
            <a href="right.html" target="rightFrame">Home</a>
            <a href="login.html" target="rightFrame">Login</a>
            <a href="registration.html" target="rightFrame">Registration</a>
            <a href="catalogue.html" target="rightFrame">Catalogue</a>
            <a href="cart1.html" target="rightFrame">Cart</a>
        </div>
    </div>
</body>
</html>
